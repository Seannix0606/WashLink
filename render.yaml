services:
  - type: static_site
    name: washlink-frontend
    env: static
    branch: main
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free

  - type: web_service
    name: washlink-backend
    env: python
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    pythonVersion: 3.12
