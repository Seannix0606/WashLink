version: "3.9"
services:
  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - APP_DEBUG=${APP_DEBUG}
      - APP_ENV=${APP_ENV}
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: washlink
      POSTGRES_USER: washlink
      POSTGRES_PASSWORD: washlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres_data:
